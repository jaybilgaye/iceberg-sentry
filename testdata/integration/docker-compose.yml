services:
  # MinIO is a drop-in S3-compatible object store. We expose it on :9000
  # for the data plane and :9001 for the web console. The bucket is
  # created by the `mc` init container below.
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server --console-address :9001 /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-12-17T15-15-25Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/iceberg-warehouse &&
      mc anonymous set download local/iceberg-warehouse
      "

  # Iceberg REST catalog reference implementation. Backs straight onto MinIO
  # via S3FileIO. Tests connect to http://localhost:8181.
  rest:
    image: tabulario/iceberg-rest:1.6.0
    depends_on: [minio-init]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://iceberg-warehouse/wh/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports: ["8181:8181"]

  # Standalone Hive Metastore for the hive-catalog integration tests.
  # Uses Derby in-memory backing — fine for ephemeral CI test runs.
  hive-metastore:
    image: apache/hive:4.0.0
    command: ["/opt/hive/bin/hive", "--service", "metastore"]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
    ports: ["9083:9083"]
