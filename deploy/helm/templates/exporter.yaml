{{- if .Values.exporter.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iceberg-sentry.fullname" . }}-exporter
  labels:
    {{- include "iceberg-sentry.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.exporter.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "iceberg-sentry.fullname" . }}
      app.kubernetes.io/component: exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "iceberg-sentry.fullname" . }}
        app.kubernetes.io/component: exporter
    spec:
      serviceAccountName: {{ include "iceberg-sentry.serviceAccountName" . }}
      containers:
        - name: sentry
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            {{- range .Values.exporter.args }}
            - {{ . | quote }}
            {{- end }}
            - "--listen={{ .Values.exporter.listen }}"
            - "--interval={{ .Values.exporter.interval }}"
          ports:
            - name: metrics
              containerPort: 9400
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9400
            initialDelaySeconds: 15
            periodSeconds: 30
          {{- if .Values.exporter.envSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.exporter.envSecretName }}
          {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iceberg-sentry.fullname" . }}-exporter
  labels:
    {{- include "iceberg-sentry.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "iceberg-sentry.fullname" . }}
    app.kubernetes.io/component: exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "iceberg-sentry.fullname" . }}
  labels:
    {{- include "iceberg-sentry.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "iceberg-sentry.fullname" . }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
{{- end -}}
