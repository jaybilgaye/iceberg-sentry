{{- if .Values.cronjob.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "iceberg-sentry.fullname" . }}-audit
  labels:
    {{- include "iceberg-sentry.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "iceberg-sentry.serviceAccountName" . }}
          restartPolicy: Never
          containers:
            - name: sentry
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args: {{- toYaml .Values.cronjob.args | nindent 16 }}
              {{- if .Values.cronjob.envSecretName }}
              envFrom:
                - secretRef:
                    name: {{ .Values.cronjob.envSecretName }}
              {{- end }}
              volumeMounts:
                - name: policy
                  mountPath: /config
                  readOnly: true
              resources: {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: policy
              configMap:
                name: {{ include "iceberg-sentry.fullname" . }}-policy
{{- end -}}
