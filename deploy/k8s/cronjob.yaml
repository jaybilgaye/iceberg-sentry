# Periodic Iceberg Sentry health scan + Prometheus push.
#
# Adjust namespace, image tag, and the secret/configmap references for
# your cluster. Mount the catalog credentials (AWS access key, Kerberos
# keytab, REST OAuth secret) only via the existing secret manager;
# never bake them into the container image.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-sentry-daily-audit
  namespace: data-platform
  labels:
    app.kubernetes.io/name: iceberg-sentry
    app.kubernetes.io/component: scheduled-audit
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: iceberg-sentry
        spec:
          restartPolicy: Never
          serviceAccountName: iceberg-sentry
          containers:
            - name: sentry
              image: ghcr.io/jaybilgaye/iceberg-sentry:latest
              imagePullPolicy: IfNotPresent
              args:
                - audit
                - --catalog=glue
                - --namespace=finance
                - --policy=/config/sentry.yaml
                - --format=prometheus
                - --push-gateway=http://prometheus-pushgateway:9091
                - --push-job=iceberg-sentry
              env:
                - name: AWS_REGION
                  value: us-east-1
              envFrom:
                - secretRef:
                    name: iceberg-sentry-aws
              volumeMounts:
                - name: policy
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 65534
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: policy
              configMap:
                name: iceberg-sentry-policy
