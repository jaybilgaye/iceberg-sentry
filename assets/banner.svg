<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050a14"/>
      <stop offset=".55" stop-color="#0b1a34"/>
      <stop offset="1" stop-color="#122347"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ca7ff"/>
      <stop offset="1" stop-color="#8ac6ff"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a9eff" stop-opacity=".4"/>
      <stop offset="1" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4a9eff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="1"/></filter>
  </defs>

  <!-- background -->
  <rect width="1600" height="400" fill="url(#bg)"/>
  <rect width="1600" height="400" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#1a2b52" stroke-width="1" opacity=".55">
    <path d="M0 100 L1600 100 M0 200 L1600 200 M0 300 L1600 300"/>
    <path d="M200 0 L200 400 M400 0 L400 400 M600 0 L600 400 M800 0 L800 400 M1000 0 L1000 400 M1200 0 L1200 400 M1400 0 L1400 400"/>
  </g>

  <!-- iceberg silhouette on the right (below waterline) -->
  <g opacity=".35" transform="translate(1050,90)">
    <path fill="url(#ice)" d="M180 0 L340 60 L400 130 L370 220 L290 290 L200 310 L110 285 L45 210 L15 130 L60 65 Z"/>
    <path fill="none" stroke="#5ca7ff" stroke-width="2" opacity=".6" d="M180 0 L340 60 L400 130 L370 220 L290 290 L200 310 L110 285 L45 210 L15 130 L60 65 Z"/>
    <path fill="none" stroke="#5ca7ff" stroke-width="1.4" opacity=".45" d="M180 0 L200 110 L110 285 M340 60 L200 110 L290 290 M15 130 L200 110 M400 130 L200 110"/>
  </g>

  <!-- Left content -->
  <g transform="translate(120,110)">
    <!-- kicker -->
    <text x="0" y="0" fill="#7a8ba8" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" letter-spacing="4">// LAKEHOUSE  RELIABILITY,  BEFORE  A  QUERY  FAILS</text>

    <!-- brand mark -->
    <g transform="translate(0,32)">
      <circle cx="34" cy="34" r="30" fill="none" stroke="url(#accent)" stroke-width="4"/>
      <line x1="34" y1="4"  x2="34" y2="64" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
      <line x1="4"  y1="34" x2="64" y2="34" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
      <circle cx="34" cy="34" r="7" fill="#4a9eff"/>
    </g>

    <!-- wordmark -->
    <text x="82" y="80" fill="#ffffff" font-family="ui-monospace, 'JetBrains Mono', monospace" font-weight="700" font-size="60" letter-spacing="-2">iceberg-sentry</text>

    <!-- tagline -->
    <text x="0" y="140" fill="#c5cddb" font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="22">
      Iceberg-native diagnostics for Apache Iceberg tables — from metadata alone.
    </text>
    <text x="0" y="172" fill="#7a8ba8" font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="18">
      Health score · delete amplification · orphan files · PII · partition skew · cost · SARIF · Prometheus.
    </text>

    <!-- pill row -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" transform="translate(0,204)">
      <g>
        <rect x="0" y="0" width="120" height="26" rx="13" fill="#0f1a2b" stroke="#28406b"/>
        <text x="60" y="18" text-anchor="middle" fill="#8ac6ff">&lt; 20MB binary</text>
      </g>
      <g transform="translate(132,0)">
        <rect x="0" y="0" width="120" height="26" rx="13" fill="#0f1a2b" stroke="#28406b"/>
        <text x="60" y="18" text-anchor="middle" fill="#8ac6ff">CI-native</text>
      </g>
      <g transform="translate(264,0)">
        <rect x="0" y="0" width="130" height="26" rx="13" fill="#0f1a2b" stroke="#28406b"/>
        <text x="65" y="18" text-anchor="middle" fill="#8ac6ff">engine-agnostic</text>
      </g>
      <g transform="translate(406,0)">
        <rect x="0" y="0" width="130" height="26" rx="13" fill="#0f1a2b" stroke="#28406b"/>
        <text x="65" y="18" text-anchor="middle" fill="#8ac6ff">Apache 2.0</text>
      </g>
    </g>
  </g>

  <!-- terminal-ish preview panel bottom-right -->
  <g transform="translate(940,280)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14">
    <rect x="0" y="0" width="560" height="90" rx="10" fill="#0a1224" stroke="#28406b"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f56"/>
    <circle cx="34" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="50" cy="18" r="5" fill="#27c93f"/>
    <text x="72" y="22" fill="#5c6d8a">~ iceberg-sentry audit --table finance.transactions</text>
    <text x="20" y="52" fill="#4a9eff">$</text>
    <text x="38" y="52" fill="#e7e7e7">Score: 61/100  </text>
    <text x="200" y="52" fill="#ef4444" font-weight="700">CRITICAL</text>
    <text x="20" y="76" fill="#ef4444">[CRIT]</text>
    <text x="70" y="76" fill="#c5cddb">Delete File Amplification  12/20   1,842 files</text>
  </g>
</svg>
