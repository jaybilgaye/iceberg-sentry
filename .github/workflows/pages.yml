name: Pages

# Publishes the marketing site + docs under `site/` to GitHub Pages.
#
# One-time setup:
#   Settings → Pages → Build and deployment → Source: **GitHub Actions**
# After that, every push to `main` that touches `site/` re-deploys.
# You can also run this workflow manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
