name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l -d .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build dev container from source
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          push: false
          load: true
          tags: iceberg-sentry:pr
      - name: Verify image runs
        run: |
          docker run --rm iceberg-sentry:pr version
          docker run --rm iceberg-sentry:pr audit --help > /dev/null
