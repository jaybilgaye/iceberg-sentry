name: Helm smoke

# Spins a kind cluster, installs the chart in exporter mode, verifies the
# ServiceAccount + ConfigMap + Deployment come up, and hits /healthz.
#
# Doesn't exercise the CronJob path (no cluster time to wait 24h) and doesn't
# install kube-prometheus-stack CRDs — ServiceMonitor is switched off in the
# smoke config.

on:
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-smoke.yml'
  pull_request:
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kind-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build a local image for kind
        run: |
          # CGO_ENABLED=0 is critical — the release Dockerfile is
          # `FROM scratch` and cgo-linked binaries fail with
          # "exec: no such file or directory" because there's no libc
          # in scratch.
          CGO_ENABLED=0 go build -o iceberg-sentry ./cmd/iceberg-sentry
          file iceberg-sentry
          docker build -f Dockerfile -t iceberg-sentry:smoke .
          # Quick sanity: run the binary directly through the image once
          # so failures like the above surface at build time, not on the
          # helm --wait timeout 90s later.
          docker run --rm iceberg-sentry:smoke version

      - name: Set up kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sentry-smoke
          wait: 60s

      - name: Load local image into kind
        run: kind load docker-image iceberg-sentry:smoke --name sentry-smoke

      - name: Install Helm chart (exporter mode, no ServiceMonitor)
        timeout-minutes: 4
        run: |
          # Wall-clock kill of helm install after 3m — belt-and-suspenders
          # against helm's own --wait timeout being ignored (as it was in
          # the first run of this workflow).
          #
          # AWS_EC2_METADATA_DISABLED=true is critical: buildStorage
          # unconditionally initializes an S3 backend, which calls
          # aws-sdk-go-v2 LoadDefaultConfig, which polls EC2 IMDS. On kind
          # inside a GH runner the IMDS endpoint is not reachable and the
          # SDK's IMDS retry loop hangs the exporter's synchronous initial
          # scan for several minutes, blocking /healthz from ever going
          # green.
          timeout --preserve-status --signal=KILL 180 helm install sentry deploy/helm \
            --set image.repository=iceberg-sentry \
            --set image.tag=smoke \
            --set image.pullPolicy=IfNotPresent \
            --set cronjob.enabled=false \
            --set exporter.enabled=true \
            --set exporter.args='{export,--catalog=localfs,--catalog-root=/tmp,--namespace=nothing}' \
            --set 'exporter.extraEnv[0].name=AWS_EC2_METADATA_DISABLED' \
            --set-string 'exporter.extraEnv[0].value=true' \
            --set serviceMonitor.enabled=false \
            --set exporter.envSecretName= \
            --wait --timeout=90s

      - name: Verify resources exist
        run: |
          kubectl get sa sentry-iceberg-sentry
          kubectl get cm sentry-iceberg-sentry-policy
          kubectl get deploy sentry-iceberg-sentry-exporter
          kubectl get svc sentry-iceberg-sentry-exporter

      - name: Wait for exporter pod ready
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app.kubernetes.io/component=exporter --timeout=2m

      - name: Curl /healthz through port-forward
        run: |
          kubectl port-forward svc/sentry-iceberg-sentry-exporter 9400:9400 &
          PF_PID=$!
          # Wait until port-forward is actually ready
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9400/healthz >/dev/null 2>&1; then
              echo "healthz OK"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:9400/healthz; then
            echo "::error::/healthz did not return 200"
            kubectl logs -l app.kubernetes.io/component=exporter --tail=100 || true
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi
          echo
          echo "=== /metrics first 10 lines ==="
          curl -sf http://127.0.0.1:9400/metrics | head -10 || true
          kill $PF_PID 2>/dev/null || true

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get all -A
          kubectl describe deploy sentry-iceberg-sentry-exporter || true
          kubectl logs -l app.kubernetes.io/component=exporter --tail=200 || true
