name: Performance regression

on:
  pull_request:
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  bench:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # Run current-branch benchmarks.
      - name: Bench current
        run: |
          go test -run=^$ -bench=. -benchmem -count=5 ./internal/scan ./internal/iceberg ./internal/bloom \
            | tee bench-current.txt

      # Run baseline (target branch) benchmarks for comparison.
      - name: Bench baseline (target branch)
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          go test -run=^$ -bench=. -benchmem -count=5 ./internal/scan ./internal/iceberg ./internal/bloom \
            | tee bench-baseline.txt
          git checkout -

      # benchstat is the official analysis tool from x/perf.
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare
        run: |
          ~/go/bin/benchstat bench-baseline.txt bench-current.txt | tee bench-diff.txt
          # Fail the job if the per-op time regresses by > 20% on any benchmark.
          if grep -E "\+[2-9][0-9]\.[0-9]+%" bench-diff.txt; then
            echo "::error::Performance regression > 20% detected"
            exit 1
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '```\n' + fs.readFileSync('bench-diff.txt', 'utf8') + '\n```';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Performance comparison\n${body}`,
            });
